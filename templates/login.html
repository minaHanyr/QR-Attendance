<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | نظام الحضور</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --blue:#4361ee;--violet:#7209b7;--cyan:#4cc9f0;
      --green:#06d6a0;--orange:#fb8500;
    }
    body{
      font-family:'Cairo',sans-serif;
      background:#060a14;
      min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      overflow:hidden;direction:rtl;
    }

    /* خلفية Three.js */
    #bg-canvas{position:fixed;inset:0;z-index:0;}

    /* layout */
    .login-layout{
      display:flex;align-items:center;gap:56px;
      z-index:10;position:relative;padding:20px;
    }

    /* جانب الروبوت */
    .robot-side{
      display:flex;flex-direction:column;align-items:center;gap:14px;
      animation:sideEntry 0.9s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes sideEntry{from{opacity:0;transform:translateX(-50px) scale(.85)}to{opacity:1;transform:none}}

    #robot-canvas{
      cursor:grab;border-radius:16px;
      filter:drop-shadow(0 0 32px rgba(67,97,238,.55))
             drop-shadow(0 0 70px rgba(6,214,160,.2));
      transition:filter .3s;
    }
    #robot-canvas:active{cursor:grabbing;}
    #robot-canvas:hover{
      filter:drop-shadow(0 0 50px rgba(67,97,238,.85))
             drop-shadow(0 0 90px rgba(6,214,160,.35));
    }

    .robot-label{
      font-family:'Space Mono',monospace;font-size:.62rem;
      color:rgba(6,214,160,.7);letter-spacing:3px;
      animation:blink 2.5s ease-in-out infinite;
    }
    @keyframes blink{0%,100%{opacity:.4}50%{opacity:1}}

    /* speech bubble */
    .speech-bubble{
      background:rgba(255,255,255,.05);
      border:1px solid rgba(6,214,160,.3);
      border-radius:14px 14px 14px 4px;
      padding:8px 14px;font-size:.8rem;
      color:rgba(255,255,255,.8);text-align:center;
      max-width:200px;position:relative;
      backdrop-filter:blur(10px);
      animation:bubblePop .5s cubic-bezier(.34,1.56,.64,1) both;
      min-height:36px;
    }
    @keyframes bubblePop{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}

    /* card */
    .card-wrap{perspective:1000px;}
    .card-3d{
      width:380px;
      background:rgba(255,255,255,.032);
      backdrop-filter:blur(28px);
      border:1px solid rgba(255,255,255,.07);
      border-radius:28px;padding:44px 38px 40px;
      box-shadow:0 40px 80px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.09);
      animation:cardEntry .9s cubic-bezier(.34,1.56,.64,1) .15s both;
      position:relative;overflow:hidden;
      transform-style:preserve-3d;transition:transform .12s ease;
    }
    @keyframes cardEntry{from{opacity:0;transform:translateX(50px) scale(.9)}to{opacity:1;transform:none}}
    .card-3d::before{
      content:'';position:absolute;top:0;left:10%;right:10%;height:1px;
      background:linear-gradient(90deg,transparent,rgba(67,97,238,.8),rgba(76,201,240,.6),transparent);
    }

    /* logo */
    .logo-wrap{text-align:center;margin-bottom:28px;}
    .logo-title{font-size:1.45rem;font-weight:900;color:white;letter-spacing:-.5px;}
    .logo-sub{
      font-family:'Space Mono',monospace;font-size:.62rem;
      color:var(--cyan);margin-top:4px;letter-spacing:3px;opacity:.6;
    }

    /* fields */
    .field-wrap{margin-bottom:16px;}
    .field-label{
      display:block;color:rgba(255,255,255,.45);
      font-size:.75rem;font-weight:700;margin-bottom:7px;letter-spacing:.5px;
    }
    .field-inner{position:relative;}
    .field-icon{
      position:absolute;right:14px;top:50%;transform:translateY(-50%);
      font-size:.9rem;pointer-events:none;z-index:2;
    }
    #eyeIcon{pointer-events:all;cursor:pointer;}
    .field-inner input{
      width:100%;padding:12px 40px 12px 16px;
      background:rgba(255,255,255,.05);
      border:1.5px solid rgba(255,255,255,.08);
      border-radius:12px;color:white;
      font-family:'Cairo',sans-serif;font-size:.92rem;outline:none;
      transition:all .25s;
    }
    .field-inner input:focus{
      background:rgba(67,97,238,.1);border-color:var(--blue);
      box-shadow:0 0 0 3px rgba(67,97,238,.15);
    }
    .field-inner input::placeholder{color:rgba(255,255,255,.2);}

    /* button */
    .btn-login{
      width:100%;padding:14px;
      background:linear-gradient(135deg,var(--blue),#5e4aff,var(--violet));
      background-size:200% 200%;
      border:none;border-radius:12px;color:white;
      font-family:'Cairo',sans-serif;font-size:1rem;font-weight:800;
      cursor:pointer;margin-top:8px;position:relative;overflow:hidden;
      transition:all .3s;box-shadow:0 8px 24px rgba(67,97,238,.4);
      animation:gradShift 4s ease infinite;
    }
    @keyframes gradShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
    .btn-login::before{
      content:'';position:absolute;inset:0;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);
      transform:translateX(-100%);transition:transform .6s;
    }
    .btn-login:hover{transform:translateY(-2px);box-shadow:0 14px 36px rgba(67,97,238,.55);}
    .btn-login:hover::before{transform:translateX(100%);}
    .btn-login:active{transform:translateY(1px);}

    .ripple{
      position:absolute;border-radius:50%;
      background:rgba(255,255,255,.25);transform:scale(0);
      animation:rippleA .6s linear;pointer-events:none;
    }
    @keyframes rippleA{to{transform:scale(4);opacity:0}}

    /* error */
    .error-msg{
      background:rgba(239,35,60,.1);border:1px solid rgba(239,35,60,.25);
      color:#ff6b7a;padding:10px 14px;border-radius:10px;
      font-size:.82rem;margin-bottom:18px;text-align:center;
      animation:shake .4s ease;
    }
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}

    .hint{
      text-align:center;color:rgba(255,255,255,.15);
      font-size:.68rem;margin-top:18px;
      font-family:'Space Mono',monospace;
    }

    /* responsive */
    /* responsive */
@media(max-width:820px) {
  .login-layout {
    flex-direction: column;
    gap: 20px;
  }
  .robot-side {
    transform: scale(0.6); /* تصغير حجم الروبوت */
    margin-bottom: -30px; /* تقليل المسافة بين الروبوت وكارت تسجيل الدخول */
  }
  .card-3d {
    width: 92vw;
    padding: 36px 22px 32px;
  }
}

@media(max-width:480px) {
  .robot-side {
    transform: scale(0.45); /* تصغير حجم الروبوت أكثر في الشاشات الصغيرة */
    margin-bottom: -50px; /* تقليل المسافة أكثر */
  }
}

  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<div class="login-layout">

  <!-- ══ جانب الروبوت ══ -->
  <div class="robot-side">
    <canvas id="robot-canvas" width="240" height="300"></canvas>
    <div class="speech-bubble" id="bubble">👋 أهلاً، سجّل دخولك!</div>
    <div class="robot-label">EDU · BOT · v2</div>
  </div>

  <!-- ══ كارت اللوجين ══ -->
  <div class="card-wrap">
    <div class="card-3d" id="card">
      <div class="logo-wrap">
        <div class="logo-title">📚 نظام الحضور</div>
        <div class="logo-sub">QR ATTENDANCE SYSTEM</div>
      </div>

      {% if error %}<div class="error-msg">⚠️ {{ error }}</div>{% endif %}

      <form method="POST" action="{{ url_for('login') }}" id="loginForm">
        <div class="field-wrap">
          <label class="field-label">اسم المستخدم</label>
          <div class="field-inner">
            <input type="text" name="username" placeholder="أدخل اسم المستخدم"
              autocomplete="username" required autofocus
              oninput="robotReact('type')">
            <span class="field-icon">👤</span>
          </div>
        </div>
        <div class="field-wrap">
          <label class="field-label">كلمة المرور</label>
          <div class="field-inner">
            <input type="password" name="password" id="pwdInput"
              placeholder="••••••••" autocomplete="current-password" required
              oninput="robotReact('pwd')">
            <span class="field-icon" id="eyeIcon" onclick="togglePwd()">👁️</span>
          </div>
        </div>
        <button type="submit" class="btn-login" id="loginBtn">🔐 &nbsp;دخول</button>
      </form>
      <p class="hint">admin / admin123</p>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════
   1. خلفية جسيمات بسيطة
══════════════════════════════════════════════════ */
(function(){
  const cv = document.getElementById('bg-canvas');
  const ctx = cv.getContext('2d');
  let W,H,pts=[];
  function resize(){ W=cv.width=innerWidth; H=cv.height=innerHeight; }
  resize(); window.addEventListener('resize',()=>{resize();init();});
  function init(){
    pts=Array.from({length:Math.floor(W*H/9000)},()=>({
      x:Math.random()*W,y:Math.random()*H,
      vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,
      r:Math.random()*1.3+.3,
      c:['#4361ee','#4cc9f0','#06d6a0','#ffffff'][Math.floor(Math.random()*4)],
      a:Math.random()*.5+.1,
    }));
  }
  init();
  function draw(){
    ctx.clearRect(0,0,W,H);
    // شبكة
    ctx.strokeStyle='rgba(67,97,238,.04)';ctx.lineWidth=1;
    for(let x=0;x<W;x+=70){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=70){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;
      if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.c;ctx.globalAlpha=p.a;ctx.fill();
    });
    ctx.globalAlpha=1;
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ══════════════════════════════════════════════════
   2. روبوت Three.js
══════════════════════════════════════════════════ */
(function(){
  const cv = document.getElementById('robot-canvas');
  const renderer = new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(240,300);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45,240/300,.1,100);
  camera.position.set(0,.3,5.5);

  /* — إضاءة — */
  scene.add(new THREE.AmbientLight(0x334466,1.5));
  const key = new THREE.DirectionalLight(0x88aaff,2.5);
  key.position.set(3,5,4); key.castShadow=true; scene.add(key);
  const fill= new THREE.PointLight(0x06d6a0,2,12);
  fill.position.set(-3,0,3); scene.add(fill);
  const back= new THREE.PointLight(0xfb8500,1.5,10);
  back.position.set(0,-3,-2); scene.add(back);

  /* — مواد — */
  const MAT = {
    body:  new THREE.MeshPhongMaterial({color:0x1e2d5a,specular:0x4466cc,shininess:80}),
    panel: new THREE.MeshPhongMaterial({color:0x0d1b38,specular:0x223355,shininess:40}),
    glow:  new THREE.MeshPhongMaterial({color:0x4361ee,emissive:0x4361ee,emissiveIntensity:.9,shininess:200}),
    green: new THREE.MeshPhongMaterial({color:0x06d6a0,emissive:0x06d6a0,emissiveIntensity:.8}),
    orange:new THREE.MeshPhongMaterial({color:0xfb8500,emissive:0xfb8500,emissiveIntensity:.7}),
    white: new THREE.MeshPhongMaterial({color:0xffffff,emissive:0x334466,emissiveIntensity:.3,shininess:300}),
    dark:  new THREE.MeshPhongMaterial({color:0x0a1020,shininess:20}),
    screen:new THREE.MeshPhongMaterial({color:0x060f1e,emissive:0x0a2244,emissiveIntensity:.5,shininess:200}),
  };

  const G = THREE.BoxGeometry;
  const CG= THREE.CylinderGeometry;
  const SG= THREE.SphereGeometry;

  function box(w,h,d,mat,x,y,z,rx=0,ry=0,rz=0){
    const m=new THREE.Mesh(new G(w,h,d),mat);
    m.position.set(x,y,z);m.rotation.set(rx,ry,rz);
    m.castShadow=true;m.receiveShadow=true;
    return m;
  }
  function cyl(rt,rb,h,seg,mat,x,y,z,rx=0,ry=0,rz=0){
    const m=new THREE.Mesh(new CG(rt,rb,h,seg),mat);
    m.position.set(x,y,z);m.rotation.set(rx,ry,rz);
    m.castShadow=true; return m;
  }
  function sph(r,seg,mat,x,y,z){
    const m=new THREE.Mesh(new SG(r,seg,seg),mat);
    m.position.set(x,y,z);m.castShadow=true;return m;
  }

  const robot = new THREE.Group();

  /* ─── جسم الروبوت ─── */
  // الجذع
  const torso = box(1.4,1.6,.8,MAT.body, 0,0,0);
  // لوحة الصدر
  const chestPanel = box(1,.9,.05,MAT.panel, 0,.05,.43);
  // شاشة صغيرة على الصدر
  const screenMesh = box(.7,.45,.04,MAT.screen, 0,.1,.46);
  const screenGlow = new THREE.PointLight(0x4cc9f0,1,1.5);
  screenGlow.position.set(0,.1,.5);

  // أزرار صدر
  const btnColors = [MAT.green, MAT.orange, MAT.glow];
  const btns=[];
  [-0.22,0,0.22].forEach((bx,i)=>{
    const b=box(.1,.1,.04,btnColors[i],bx,-.22,.47);
    btns.push(b); torso.add(b);
  });

  torso.add(chestPanel,screenMesh,screenGlow);

  /* ─── رقبة ─── */
  const neck = cyl(.12,.15,.25,8,MAT.body, 0,.97,0);

  /* ─── رأس ─── */
  const head = new THREE.Group();
  const headBox = box(1.1,1,.95,MAT.body, 0,0,0);

  // واجهة الرأس — فيزور
  const visor = box(.9,.45,.06,MAT.screen, 0,.08,.5);
  const visorGlow = new THREE.PointLight(0x4361ee,.8,2);
  visorGlow.position.set(0,.08,.6);

  // عيون
  const eyeL = sph(.13,10,MAT.glow, -.25,.1,.52);
  const eyeR = sph(.13,10,MAT.glow,  .25,.1,.52);
  // بؤبؤ
  const pupilL = sph(.07,8,MAT.dark,-.25,.1,.63);
  const pupilR = sph(.07,8,MAT.dark, .25,.1,.63);
  // توهج العين
  const eyeLight= new THREE.PointLight(0x4361ee,1.5,1.8);
  eyeLight.position.set(0,.1,.6);

  // فم — شريط ليد
  const mouthBar = box(.55,.06,.04,MAT.green, 0,-.2,.51);
  const mouthGlow= new THREE.PointLight(0x06d6a0,.5,1);
  mouthGlow.position.set(0,-.2,.55);

  // أذن يسار
  const earL = box(.08,.3,.25,MAT.panel,-.6,.05,0);
  const earLed= box(.04,.04,.04,MAT.glow,-.65,.1,.1);
  // أذن يمين
  const earR = box(.08,.3,.25,MAT.panel, .6,.05,0);
  const earLed2=box(.04,.04,.04,MAT.orange,.65,.1,.1);

  head.add(headBox,visor,visorGlow,eyeL,eyeR,pupilL,pupilR,
           eyeLight,mouthBar,mouthGlow,earL,earLed,earR,earLed2);
  head.position.set(0,1.35,0);

  /* ─── هوائي ─── */
  const antenna = new THREE.Group();
  const antBase  = cyl(.04,.05,.5,8, MAT.body,  0,0,0);
  const antBall  = sph(.1,10,MAT.glow, 0,.35,0);
  const antLight = new THREE.PointLight(0x4361ee,1.5,1.5);
  antLight.position.set(0,.35,0);
  antenna.add(antBase,antBall,antLight);
  antenna.position.set(0,.55,0);
  head.add(antenna);

  /* ─── أكتاف + أذرع ─── */
  // كتف يسار
  const shoulderL = sph(.2,10,MAT.glow,-.85,.25,0);
  // ذراع يسار
  const armL = new THREE.Group();
  const upperL = box(.28,1,.28,MAT.body, 0,0,0);
  const lowerL = box(.24,.85,.24,MAT.panel, 0,-.93,0);
  const handL  = sph(.19,10,MAT.glow, 0,-1.42,0);
  armL.add(upperL,lowerL,handL);
  armL.position.set(-.95,-.05,0);

  // كتف يمين
  const shoulderR = sph(.2,10,MAT.glow,.85,.25,0);
  // ذراع يمين
  const armR = new THREE.Group();
  const upperR = box(.28,1,.28,MAT.body, 0,0,0);
  const lowerR = box(.24,.85,.24,MAT.panel, 0,-.93,0);
  const handR  = sph(.19,10,MAT.glow, 0,-1.42,0);
  armR.add(upperR,lowerR,handR);
  armR.position.set(.95,-.05,0);

  /* ─── ساقان ─── */
  const hipBar = box(1.1,.18,.55,MAT.panel, 0,-.89,0);

  const legL = new THREE.Group();
  const thighL = box(.38,.7,.38,MAT.body,   0,0,0);
  const shinL  = box(.32,.65,.32,MAT.panel,  0,-.68,0);
  const footL  = box(.42,.18,.55,MAT.body,   0,-1.08,.08);
  legL.add(thighL,shinL,footL);
  legL.position.set(-.38,-1.13,0);

  const legR = new THREE.Group();
  const thighR = box(.38,.7,.38,MAT.body,   0,0,0);
  const shinR  = box(.32,.65,.32,MAT.panel,  0,-.68,0);
  const footR  = box(.42,.18,.55,MAT.body,   0,-1.08,.08);
  legR.add(thighR,shinR,footR);
  legR.position.set(.38,-1.13,0);

  /* ─── تجميع ─── */
  robot.add(torso,neck,head,hipBar);
  robot.add(shoulderL,armL,shoulderR,armR);
  robot.add(legL,legR);

  // رفع الروبوت للمنتصف
  robot.position.y = .6;
  scene.add(robot);

  /* ─── تدوير بالماوس / لمس ─── */
  let isDrag=false,prevX=0,prevY=0,rotY=0,velX=0;
  cv.addEventListener('mousedown', e=>{isDrag=true;prevX=e.clientX;});
  cv.addEventListener('touchstart',e=>{isDrag=true;prevX=e.touches[0].clientX;});
  window.addEventListener('mouseup', ()=>isDrag=false);
  window.addEventListener('touchend',()=>isDrag=false);
  window.addEventListener('mousemove',e=>{
    if(!isDrag)return;
    velX=(e.clientX-prevX)*.015;
    rotY+=velX;prevX=e.clientX;
  });
  window.addEventListener('touchmove',e=>{
    if(!isDrag)return;
    velX=(e.touches[0].clientX-prevX)*.015;
    rotY+=velX;prevX=e.touches[0].clientX;
  });

  /* ─── animation ─── */
  let t=0;
  let eyeBlink=0;
  let mouthAnim=0;

  function animate(){
    requestAnimationFrame(animate);
    t+=.016;

    if(!isDrag){ velX*=.95; rotY+=velX+.008; }
    else velX*=.85;

    robot.rotation.y = rotY;

    // تأرجح الجسم
    robot.position.y = .6 + Math.sin(t*.8)*.06;

    // تحريك الذراعين
    armL.rotation.z =  .25 + Math.sin(t*.8+1)*.18;
    armR.rotation.z = -.25 + Math.sin(t*.8)*.18;
    // ثني المرفق
    lowerL.rotation.z = Math.sin(t*.8+1)*.1;
    lowerR.rotation.z = Math.sin(t*.8)*.1;

    // تحريك الساقين
    legL.rotation.x = Math.sin(t*.8)*.05;
    legR.rotation.x = Math.sin(t*.8+Math.PI)*.05;

    // هوائي يهز
    antenna.rotation.z = Math.sin(t*2)*.12;

    // رأس يهز
    head.rotation.z = Math.sin(t*.5)*.04;
    head.rotation.x = Math.sin(t*.3)*.03-.05;

    // وميض العيون
    eyeBlink+=.016;
    if(eyeBlink>3){ // كل 3 ثواني
      const blinkScale = eyeBlink<3.15 ? Math.max(.05,1-(eyeBlink-3)*7) : 1;
      eyeL.scale.y=blinkScale; eyeR.scale.y=blinkScale;
      pupilL.scale.y=blinkScale; pupilR.scale.y=blinkScale;
      if(eyeBlink>3.25) eyeBlink=0;
    }

    // نبضة الشاشة
    screenGlow.intensity = 1 + Math.sin(t*2)*.4;
    visorGlow.intensity  = .6+Math.sin(t*1.5)*.3;
    antLight.intensity   = 1+Math.sin(t*3)*.5;
    fill.intensity       = 1.5+Math.sin(t*.7)*.5;

    // وميض الأزرار
    MAT.green.emissiveIntensity  = .6+Math.sin(t*2)*.3;
    MAT.orange.emissiveIntensity = .5+Math.sin(t*2+1)*.3;
    MAT.glow.emissiveIntensity   = .7+Math.sin(t*2+2)*.3;

    renderer.render(scene,camera);
  }
  animate();

  /* ─── ردود الفعل ─── */
  const bubbleMsgs = {
    idle:  ['👋 أهلاً، سجّل دخولك!','📚 جاهز للتدريس!','🤖 في خدمتك!','✨ يلا نبدأ!'],
    type:  ['⌨️ ممتاز، استمر!','✅ أدخل اسمك','🔤 تمام كده!'],
    pwd:   ['🔒 كلمة السر؟','🛡️ حافظ على سريتها!','🔑 قريباً نكون جوه!'],
    error: ['❌ حاول تاني!','🤔 مش صح..','⚠️ غلط، حاول!'],
    submit:['🚀 جاري الدخول...','⏳ لحظة صبر...'],
  };
  let bubbleTimer;
  function setBubble(type){
    clearTimeout(bubbleTimer);
    const list = bubbleMsgs[type]||bubbleMsgs.idle;
    document.getElementById('bubble').textContent =
      list[Math.floor(Math.random()*list.length)];
    if(type!=='idle'){
      bubbleTimer=setTimeout(()=>setBubble('idle'),3000);
    }
  }
  setBubble('idle');
  setInterval(()=>setBubble('idle'),7000);

  // expose للـ form
  window.robotReact = setBubble;
  window._setBubble = setBubble;
})();

/* ══════════════════════════════════════════════════
   3. تأثير الكارت
══════════════════════════════════════════════════ */
const card=document.getElementById('card');
document.addEventListener('mousemove',e=>{
  const dx=(e.clientX/innerWidth-.5)*12;
  const dy=(e.clientY/innerHeight-.5)*12;
  card.style.transform=`rotateX(${-dy}deg) rotateY(${dx}deg)`;
});
document.addEventListener('mouseleave',()=>{
  card.style.transform='';card.style.transition='transform .8s ease';
  setTimeout(()=>card.style.transition='transform .12s ease',800);
});

/* ══════════════════════════════════════════════════
   4. أدوات
══════════════════════════════════════════════════ */
function togglePwd(){
  const i=document.getElementById('pwdInput');
  const ic=document.getElementById('eyeIcon');
  i.type=i.type==='password'?'text':'password';
  ic.textContent=i.type==='password'?'👁️':'🙈';
}

document.getElementById('loginBtn').addEventListener('click',function(e){
  const rect=this.getBoundingClientRect();
  const r=document.createElement('span');
  r.className='ripple';
  const s=Math.max(rect.width,rect.height);
  r.style.cssText=`width:${s}px;height:${s}px;left:${e.clientX-rect.left-s/2}px;top:${e.clientY-rect.top-s/2}px`;
  this.appendChild(r);setTimeout(()=>r.remove(),700);
});

document.getElementById('loginForm').addEventListener('submit',function(){
  if(window._setBubble) window._setBubble('submit');
  const btn=document.getElementById('loginBtn');
  btn.innerHTML='⏳ &nbsp;جاري الدخول...';btn.style.opacity='.8';
});

{% if error %}
setTimeout(()=>{ if(window._setBubble) window._setBubble('error'); },500);
{% endif %}
</script>
