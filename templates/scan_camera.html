<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مسح QR</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
</head>
<body>
<div class="app-layout">
  {% include 'sidebar.html' %}
  <main class="main-content">
    <div class="topbar">
      <div class="topbar-title">
        <h1>📷 مسح QR Code</h1>
        <p id="statusText" style="color:var(--gray);">اضغط تشغيل الكاميرا</p>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;" class="scan-grid">

      <!-- Camera -->
      <div class="card">
        <div class="card-header"><h2>📷 الكاميرا</h2></div>
        <div class="card-body">
          <div style="position:relative;background:#000;border-radius:10px;overflow:hidden;">
            <video id="video" autoplay playsinline muted style="width:100%;display:block;"></video>
            <!-- اطار تصويب -->
            <div style="position:absolute;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:center;">
              <div style="width:220px;height:220px;border:3px solid rgba(67,97,238,0.9);border-radius:12px;
                box-shadow:0 0 0 2000px rgba(0,0,0,0.35);position:relative;">
                <div style="position:absolute;top:-4px;left:-4px;width:28px;height:28px;border-top:5px solid #4361ee;border-left:5px solid #4361ee;border-radius:4px 0 0 0;"></div>
                <div style="position:absolute;top:-4px;right:-4px;width:28px;height:28px;border-top:5px solid #4361ee;border-right:5px solid #4361ee;border-radius:0 4px 0 0;"></div>
                <div style="position:absolute;bottom:-4px;left:-4px;width:28px;height:28px;border-bottom:5px solid #4361ee;border-left:5px solid #4361ee;border-radius:0 0 0 4px;"></div>
                <div style="position:absolute;bottom:-4px;right:-4px;width:28px;height:28px;border-bottom:5px solid #4361ee;border-right:5px solid #4361ee;border-radius:0 0 4px 0;"></div>
              </div>
            </div>
          </div>

          <!-- Canvas معالجة الصورة (مخفي) -->
          <canvas id="canvas" style="display:none;"></canvas>
          <!-- Canvas للعرض المعالج (اختياري للـ debug) -->
          <canvas id="debugCanvas" style="display:none;width:100%;border-radius:8px;margin-top:8px;"></canvas>

          <div id="result" style="margin-top:12px;padding:12px;border-radius:8px;display:none;
            font-weight:700;text-align:center;"></div>

          <div style="display:flex;gap:10px;justify-content:center;margin-top:14px;flex-wrap:wrap;">
            <button id="startBtn" class="btn btn-primary" onclick="startScan()">▶ تشغيل الكاميرا</button>
            <button id="stopBtn" class="btn btn-outline" onclick="stopScan()" style="display:none;">⏹ إيقاف</button>
            <button id="dbgBtn" class="btn btn-outline" onclick="toggleDebug()" style="display:none;font-size:0.75rem;">🔍 معاينة المعالجة</button>
          </div>

          <div id="camWrap" style="display:none;margin-top:12px;">
            <select id="camSel" class="form-control" onchange="changeCamera()" style="font-size:0.82rem;"></select>
          </div>

          <div style="margin-top:14px;background:var(--light);border-radius:8px;padding:10px;font-size:0.78rem;color:var(--gray);">
            💡 <b>نصائح:</b> قرّب الـ QR (15–20 سم) • إضاءة كافية • ثبّت الورقة
          </div>
        </div>
      </div>

      <!-- Right Panel -->
      <div>
        <div class="card" style="margin-bottom:20px;">
          <div class="card-header"><h2>✅ آخر مسح</h2></div>
          <div class="card-body" id="lastInfo">
            <div class="empty-state"><div class="empty-icon">📷</div><p>لم يتم المسح بعد</p></div>
          </div>
        </div>
        <div class="card" id="scoreCard" style="display:none;">
          <div class="card-header"><h2>⚡ تسجيل درجة</h2></div>
          <div class="card-body">
            <p id="scoreStudentName" style="font-weight:700;color:var(--primary);margin-bottom:14px;"></p>
            <div style="background:var(--light);border-radius:8px;padding:12px;margin-bottom:10px;">
              <b style="font-size:0.85rem;">📝 واجب</b>
              <div style="display:flex;gap:6px;margin-top:8px;margin-bottom:8px;">
                <button onclick="quickHW(1)" class="btn btn-success btn-sm">✅ عمل</button>
                <button onclick="quickHW(0)" class="btn btn-danger btn-sm">❌ لم يعمل</button>
              </div>
              <div style="display:flex;gap:6px;align-items:center;">
                <input id="hwS" type="number" class="form-control" placeholder="درجة" style="width:80px;">
                <span>/</span>
                <input id="hwM" type="number" class="form-control" placeholder="من" style="width:80px;">
                <button onclick="submitHW()" class="btn btn-primary btn-sm">✔</button>
              </div>
            </div>
            <div style="background:var(--light);border-radius:8px;padding:12px;">
              <b style="font-size:0.85rem;">📋 امتحان</b>
              <div style="display:flex;gap:6px;align-items:center;margin-top:8px;">
                <input id="exS" type="number" class="form-control" placeholder="درجة" style="width:80px;">
                <span>/</span>
                <input id="exM" type="number" class="form-control" placeholder="من" style="width:80px;">
                <button onclick="submitEX()" class="btn btn-success btn-sm">✔</button>
              </div>
            </div>
            <div id="scoreMsg" style="margin-top:8px;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Today log -->
    <div class="card" style="margin-top:24px;">
      <div class="card-header">
        <h2>📅 حضور اليوم</h2>
        <span id="todayCount" class="badge badge-primary">0</span>
      </div>
      <div id="todayLog" class="card-body">
        <div class="empty-state"><div class="empty-icon">📅</div><p>لا يوجد حضور بعد</p></div>
      </div>
    </div>
  </main>
</div>

<style>
@media(max-width:700px){.scan-grid{grid-template-columns:1fr !important;}}
</style>

<script>
let videoStream = null;
let rafId = null;
let lastCode = '';
let lastTime = 0;
let currentSid = null;
let todayList = [];
let debugMode = false;

// ── تشغيل الكاميرا ─────────────────────────────
async function startScan() {
  try {
    setStatus('🔄 جاري فتح الكاميرا...');
    const all = await navigator.mediaDevices.enumerateDevices();
    const cams = all.filter(d => d.kind === 'videoinput');
    if (cams.length > 1) {
      const sel = document.getElementById('camSel');
      sel.innerHTML = cams.map((c,i) =>
        `<option value="${c.deviceId}">${c.label || 'كاميرا '+(i+1)}</option>`).join('');
      document.getElementById('camWrap').style.display = 'block';
    }
    await openCamera();
  } catch(e) {
    setStatus('❌ ' + e.message);
    showResult('❌ تعذّر فتح الكاميرا: ' + e.message, false);
  }
}

async function openCamera(deviceId) {
  if (videoStream) videoStream.getTracks().forEach(t => t.stop());
  if (rafId) cancelAnimationFrame(rafId);

  videoStream = await navigator.mediaDevices.getUserMedia({
    video: deviceId
      ? { deviceId: { exact: deviceId } }
      : { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
  });

  const v = document.getElementById('video');
  v.srcObject = videoStream;
  await v.play();

  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('stopBtn').style.display = '';
  document.getElementById('dbgBtn').style.display = '';
  setStatus('🟢 شغال — قرّب الـ QR للإطار الأزرق');
  loop();
}

async function changeCamera() {
  await openCamera(document.getElementById('camSel').value);
}

function stopScan() {
  if (videoStream) videoStream.getTracks().forEach(t => t.stop());
  if (rafId) cancelAnimationFrame(rafId);
  videoStream = null;
  document.getElementById('startBtn').style.display = '';
  document.getElementById('stopBtn').style.display = 'none';
  document.getElementById('dbgBtn').style.display = 'none';
  setStatus('⏸ الكاميرا متوقفة');
}

function toggleDebug() {
  debugMode = !debugMode;
  document.getElementById('debugCanvas').style.display = debugMode ? 'block' : 'none';
  document.getElementById('dbgBtn').textContent = debugMode ? '🔍 إخفاء المعالجة' : '🔍 معاينة المعالجة';
}

// ── حلقة المسح مع معالجة الصورة ───────────────
function loop() {
  const video  = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const dbgCv  = document.getElementById('debugCanvas');
  const ctx    = canvas.getContext('2d', { willReadFrequently: true });

  function tick() {
    if (!videoStream) return;

    if (video.readyState >= 2 && video.videoWidth > 0) {
      const W = video.videoWidth;
      const H = video.videoHeight;
      canvas.width = W; canvas.height = H;
      ctx.drawImage(video, 0, 0, W, H);

      // ── معالجة الصورة: Grayscale + Contrast ──
      const raw = ctx.getImageData(0, 0, W, H);
      const processed = toGrayscaleContrast(raw, 1.5, 10); // contrast, brightness boost
      ctx.putImageData(processed, 0, 0);

      // عرض في debug canvas
      if (debugMode) {
        dbgCv.width = W; dbgCv.height = H;
        dbgCv.getContext('2d').putImageData(processed, 0, 0);
      }

      // ── محاولة 1: الصورة المعالجة كاملة ──
      let code = jsQR(processed.data, W, H, { inversionAttempts: 'attemptBoth' });

      // ── محاولة 2: crop المنتصف (منطقة الإطار) ──
      if (!code) {
        const size = Math.min(W, H) * 0.65;
        const sx = (W - size) / 2, sy = (H - size) / 2;
        canvas.width = 400; canvas.height = 400;
        ctx.drawImage(video, sx, sy, size, size, 0, 0, 400, 400);
        const cropped = ctx.getImageData(0, 0, 400, 400);
        const croppedGray = toGrayscaleContrast(cropped, 1.8, 15);
        code = jsQR(croppedGray.data, 400, 400, { inversionAttempts: 'attemptBoth' });
      }

      // ── محاولة 3: الصورة الأصلية بدون معالجة ──
      if (!code) {
        canvas.width = W; canvas.height = H;
        ctx.drawImage(video, 0, 0, W, H);
        const orig = ctx.getImageData(0, 0, W, H);
        code = jsQR(orig.data, W, H, { inversionAttempts: 'attemptBoth' });
      }

      if (code) {
        const now = Date.now();
        if (code.data !== lastCode || now - lastTime > 3000) {
          lastCode = code.data;
          lastTime = now;
          onDetected(code.data);
        }
      }
    }

    rafId = requestAnimationFrame(tick);
  }

  rafId = requestAnimationFrame(tick);
}

// ── تحويل Grayscale + رفع Contrast ─────────────
function toGrayscaleContrast(imgData, contrast, brightness) {
  const data = new Uint8ClampedArray(imgData.data);
  const factor = (259 * (contrast * 100 + 255)) / (255 * (259 - contrast * 100));

  for (let i = 0; i < data.length; i += 4) {
    // Grayscale
    const gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
    // Contrast
    let c = factor * (gray - 128) + 128 + brightness;
    c = Math.max(0, Math.min(255, c));
    data[i] = data[i+1] = data[i+2] = c;
    // alpha يفضل زي ما هو
  }
  return new ImageData(data, imgData.width, imgData.height);
}

// ── لما بيلاقي QR ───────────────────────────────
async function onDetected(sid) {
  setStatus('🔄 جاري التسجيل...');
  try {
    const r = await fetch('/scan_qr', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ student_id: sid })
    });
    const d = await r.json();
    showResult((d.success ? '✅ ' : 'ℹ️ ') + d.message, d.success);
    setStatus('🟢 شغال — قرّب الـ QR للإطار الأزرق');
    currentSid = sid;
    loadStudent(sid, d.student_name);
    if (d.success) {
      todayList.unshift({ name: d.student_name || sid, time: new Date().toLocaleTimeString('ar-EG') });
      renderLog();
    }
  } catch(e) {
    showResult('❌ خطأ في الاتصال بالسيرفر', false);
    setStatus('🟢 شغال — قرّب الـ QR للإطار الأزرق');
  }
}

async function loadStudent(sid, nameFromScan) {
  let name = nameFromScan || sid;
  try {
    const r = await fetch('/student_info/' + sid);
    const d = await r.json();
    if (d.name) name = d.name;
  } catch(e) {}
  document.getElementById('lastInfo').innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="width:48px;height:48px;background:linear-gradient(135deg,var(--primary),var(--primary-light));
        border-radius:12px;display:flex;align-items:center;justify-content:center;
        color:white;font-size:1.4rem;font-weight:900;">${name[0]}</div>
      <div style="flex:1;">
        <div style="font-weight:800;font-size:1rem;">${name}</div>
        <div style="font-size:0.78rem;color:var(--gray);">${sid}</div>
      </div>
      <a href="/student_history/${sid}" class="btn btn-outline btn-sm">📋 السجل</a>
    </div>`;
  document.getElementById('scoreStudentName').textContent = '👤 ' + name;
  document.getElementById('scoreCard').style.display = '';
}

// ── درجات ──────────────────────────────────────
async function quickHW(score) {
  if (!currentSid) return;
  const r = await fetch('/api/homework', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ student_id: currentSid, score, max_score: 1 })
  });
  showScoreMsg((await r.json()).message, true);
}
async function submitHW() {
  const s = +document.getElementById('hwS').value, m = +document.getElementById('hwM').value;
  if (!m) return showScoreMsg('أدخل الدرجة الكاملة', false);
  const r = await fetch('/api/homework', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ student_id: currentSid, score: s, max_score: m })
  });
  const d = await r.json(); showScoreMsg(d.message, d.success);
  document.getElementById('hwS').value = ''; document.getElementById('hwM').value = '';
}
async function submitEX() {
  const s = +document.getElementById('exS').value, m = +document.getElementById('exM').value;
  if (!m) return showScoreMsg('أدخل الدرجة الكاملة', false);
  const r = await fetch('/api/exam', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ student_id: currentSid, score: s, max_score: m })
  });
  const d = await r.json(); showScoreMsg(d.message, d.success);
  document.getElementById('exS').value = ''; document.getElementById('exM').value = '';
}

// ── Helpers ─────────────────────────────────────
function setStatus(msg) { document.getElementById('statusText').textContent = msg; }

function showResult(msg, ok) {
  const el = document.getElementById('result');
  el.style.cssText = `display:block;padding:12px;border-radius:8px;font-weight:700;text-align:center;
    background:${ok?'rgba(6,214,160,0.15)':'rgba(67,97,238,0.1)'};
    color:${ok?'var(--success)':'var(--primary)'};
    border:1px solid ${ok?'var(--success)':'var(--primary)'};`;
  el.textContent = msg;
  clearTimeout(el._t); el._t = setTimeout(() => el.style.display='none', 4000);
}

function showScoreMsg(msg, ok) {
  const el = document.getElementById('scoreMsg');
  el.innerHTML = `<div style="padding:8px 12px;border-radius:6px;font-size:0.82rem;font-weight:700;
    background:${ok?'rgba(6,214,160,0.15)':'rgba(239,35,60,0.1)'};
    color:${ok?'var(--success)':'var(--danger)'};">${msg}</div>`;
  setTimeout(() => el.innerHTML='', 3000);
}

function renderLog() {
  document.getElementById('todayCount').textContent = todayList.length;
  document.getElementById('todayLog').innerHTML = todayList.length
    ? `<table><thead><tr><th>#</th><th>الطالب</th><th>الوقت</th></tr></thead><tbody>
        ${todayList.map((s,i)=>`<tr><td>${i+1}</td><td>${s.name}</td><td>${s.time}</td></tr>`).join('')}
       </tbody></table>`
    : `<div class="empty-state"><div class="empty-icon">📅</div><p>لا يوجد حضور بعد</p></div>`;
}
</script>
</body>
</html>
